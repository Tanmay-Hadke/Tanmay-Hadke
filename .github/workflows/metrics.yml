name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: [main]
    paths-ignore:
      - "github-metrics.svg"
      - "github-streak-stats.svg"
      - "github-language-donut.svg"
      - "github-category-radar.svg"
permissions:
  contents: write
concurrency:
  group: profile-metrics
  cancel-in-progress: false
jobs:
  build-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: "header"
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_threshold: 2%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_topics: yes
          plugin_topics_limit: 10
          config_timezone: Asia/Kolkata

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate streak stats SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Tanmay-Hadke
        run: node scripts/generate-streak-svg.mjs

      - name: Generate language donut chart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Tanmay-Hadke
        run: node scripts/generate-language-donut.mjs

      - name: Generate repo-category radar chart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Tanmay-Hadke
        run: node scripts/generate-category-radar.mjs

      - name: Commit and push generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add github-metrics.svg github-streak-stats.svg github-language-donut.svg github-category-radar.svg

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update profile metrics"

          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — fetching and rebasing before retry..."
            git fetch origin main
            git rebase origin/main
            sleep $(( RANDOM % 5 + 1 ))
          done

          echo "Failed to push after 5 attempts."
          exit 1
