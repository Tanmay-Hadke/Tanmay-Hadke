name: Generate Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: "header"
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_threshold: 2%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_topics: yes
          plugin_topics_limit: 10
          plugin_achievements: yes
          plugin_achievements_display: detailed
          config_timezone: Asia/Kolkata

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate streak stats SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Tanmay-Hadke
        run: node scripts/generate-streak-svg.mjs

      - name: Generate language donut chart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Tanmay-Hadke
        run: node scripts/generate-language-donut.mjs

      - name: Generate repo-category radar chart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Tanmay-Hadke
        run: node scripts/generate-category-radar.mjs

      - name: Commit generated SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile metrics"
          file_pattern: "github-metrics.svg github-streak-stats.svg github-language-donut.svg github-category-radar.svg"
